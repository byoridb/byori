name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    name: Engine contract smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Lint installer
        run: bash -n install.sh

      # Downloads the pinned ENGINE_TAG release from byoridb/byoridb and installs
      # this checkout's assets — exactly what a user install does, minus Claude wiring.
      - name: Install (pinned engine + local assets)
        run: |
          export BYORIDB_HOME="$RUNNER_TEMP/byoridb-home"
          ./install.sh --assets . --no-claude --no-service
          echo "BYORIDB_HOME=$BYORIDB_HOME" >> "$GITHUB_ENV"

      - name: MCP roundtrip smoke
        run: python3 tests/smoke_mcp.py

  manager-macos:
    name: macOS Manager
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Test Swift core
        run: |
          swift test --package-path manager/macos
          swift run --package-path manager/macos ByoriManagerSelfTest

      - name: Build with strict concurrency checks
        run: >-
          swift build --package-path manager/macos --product ByoriManager
          -Xswiftc -strict-concurrency=complete -Xswiftc -warnings-as-errors

      - name: Build app and development DMG
        run: VERSION=0.0.0 scripts/build-macos-dmg.sh

      - name: Verify disk image
        run: hdiutil verify dist/ByoriManager-0.0.0-$(uname -m).dmg
